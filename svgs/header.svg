<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
    <defs>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#00ffff" stop-opacity="0.1"/>
            <stop offset="50%" stop-color="#00ffff" stop-opacity="0"/>
            <stop offset="100%" stop-color="#00ffff" stop-opacity="0.1"/>
        </linearGradient>
    </defs>

    <rect width="800" height="250" fill="#0a0a14"/>
    <rect width="800" height="250" fill="url(#scan)">
        <animate attributeName="y" values="0;250;0" dur="4s" repeatCount="indefinite"/>
    </rect>

    <!-- Synthwave lines -->
    <g opacity="0.1">
        <line x1="0" y1="80" x2="800" y2="80" stroke="#ff00ff">
            <animate attributeName="x1" values="0;800;0" dur="8s" repeatCount="indefinite"/>
        </line>
        <line x1="0" y1="160" x2="800" y2="160" stroke="#00ffff">
            <animate attributeName="x2" values="800;0;800" dur="8s" repeatCount="indefinite"/>
        </line>
    </g>

    <!-- Glitch title -->
    <g font-family="'Helvetica Neue', Arial, sans-serif" font-weight="900" text-anchor="middle">
        <text x="402" y="110" font-size="64" fill="#00ffff" opacity="0.7" filter="url(#glow)">
            SYNAPSE
            <animate attributeName="opacity" values="0.7;0.2;0.7;0.1;0.7" dur="0.15s" repeatCount="indefinite"/>
        </text>
        <text x="398" y="112" font-size="64" fill="#ff00ff" opacity="0.7" filter="url(#glow)">
            SYNAPSE
            <animate attributeName="opacity" values="0.7;0.5;0.7;0.8;0.7" dur="0.2s" repeatCount="indefinite"/>
        </text>
        <text x="400" y="110" font-size="64" fill="#ffffff">SYNAPSE</text>
    </g>

    <!-- Subtitle typing -->
    <text x="400" y="170" font-family="'Courier New', monospace" font-size="18" fill="#00ffff" text-anchor="middle" filter="url(#glow)">
        GRAPH-BASED KNOWLEDGE MANAGEMENT
        <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
    </text>

    <circle cx="100" cy="40" r="15" fill="#ff00ff" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" from="0 400 125" to="360 400 125" dur="20s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="100;130;100;70;100" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="210" r="20" fill="#00ffff" filter="url(#glow)">
        <animateTransform attributeName="transform" type="rotate" from="360 400 125" to="0 400 125" dur="15s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="210;180;210;240;210" dur="7s" repeatCount="indefinite"/>
    </circle>
</svg>