<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
    <rect width="800" height="200" fill="#0a0a14"/>
    <text x="400" y="35" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="900" fill="#ffdf00" text-anchor="middle">ROADMAP</text>
    <!-- Timeline line -->
    <line x1="50" y1="100" x2="750" y2="100" stroke="#00ffff" stroke-width="2"/>
    <!-- Nodes with pulsing dots -->
    <circle cx="200" cy="100" r="10" fill="#ff00ff">
        <animate attributeName="r" values="10;15;10" dur="1s" repeatCount="indefinite"/>
    </circle>
    <text x="200" y="80" font-family="'Courier New', monospace" font-size="14" fill="#fff" text-anchor="middle">v2.0 Semantic</text>
    <text x="200" y="130" font-family="'Courier New', monospace" font-size="10" fill="#999" text-anchor="middle">Vector embeddings</text>

    <circle cx="450" cy="100" r="10" fill="#4dffff">
        <animate attributeName="r" values="10;15;10" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <text x="450" y="80" font-family="'Courier New', monospace" font-size="14" fill="#fff" text-anchor="middle">v2.5 Collab</text>
    <text x="450" y="130" font-family="'Courier New', monospace" font-size="10" fill="#999" text-anchor="middle">Multi-user + WebSocket</text>

    <circle cx="700" cy="100" r="10" fill="#ff90e8">
        <animate attributeName="r" values="10;15;10" dur="0.9s" repeatCount="indefinite"/>
    </circle>
    <text x="700" y="80" font-family="'Courier New', monospace" font-size="14" fill="#fff" text-anchor="middle">v3.0 Learning</text>
    <text x="700" y="130" font-family="'Courier New', monospace" font-size="10" fill="#999" text-anchor="middle">Spaced repetition</text>
</svg>