            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="6.3s" fill="freeze"/>
        </text>

        <!-- Level 4 - subjects/[id] - Pink -->
        <text x="70" y="522" fill="#ff69b4" opacity="0">│   │   │   └── [id]/
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="6.7s" fill="freeze"/>
        </text>

        <!-- Level 5 - [id]/page.tsx - Light Blue -->
        <text x="70" y="544" fill="#87ceeb" opacity="0">│   │   │    │  └── page.tsx
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="7.1s" fill="freeze"/>
        </text>

        <!-- Level 3 - nodes - Orange -->
        <text x="70" y="566" fill="#ffae00" opacity="0">│   │   └── nodes/
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="7.5s" fill="freeze"/>
        </text>

        <!-- Level 4 - nodes/[id] - Pink -->
        <text x="70" y="588" fill="#ff69b4" opacity="0">│   │   │   └── [id]/
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="7.9s" fill="freeze"/>
        </text>

        <!-- Level 5 - [id]/edit - Light Blue -->
        <text x="70" y="610" fill="#87ceeb" opacity="0">│   │   │   │   └── edit/
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="8.3s" fill="freeze"/>
