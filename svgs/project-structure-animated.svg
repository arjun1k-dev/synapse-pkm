<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1020" width="100%" height="100%">
    <defs>
        <style>
            @keyframes glow {
                0%, 100% { filter: drop-shadow(0 0 2px currentColor); }
                50% { filter: drop-shadow(0 0 8px currentColor); }
            }
            .neon-text { animation: glow 2s ease-in-out infinite; }
        </style>
    </defs>

    <rect width="1000" height="1020" fill="#0a0a14"/>

    <!-- Title -->
    <text x="500" y="35" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="900" fill="#ff00ff" text-anchor="middle" class="neon-text">PROJECT STRUCTURE</text>

    <!-- Level 0 - Root - Magenta -->
    <g font-family="'Courier New', monospace" font-size="13" class="neon-text">
        <text x="50" y="75" fill="#ff00ff">synapse-pkm/</text>

        <!-- Level 1 - Direct children of root - Cyan -->
        <text x="70" y="105" fill="#00ffff" opacity="0">├── backend/
            <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.3s" fill="freeze"/>
        </text>

        <!-- Level 2 - Backend children - Lime Green -->
        <text x="70" y="130" fill="#39ff14" opacity="0">│   ├── main.py
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="0.7s" fill="freeze"/>
        </text>
        <text x="70" y="152" fill="#39ff14" opacity="0">│   ├── models.py
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1s" fill="freeze"/>
        </text>
        <text x="70" y="174" fill="#39ff14" opacity="0">│   ├── database.py
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.3s" fill="freeze"/>
        </text>
        <text x="70" y="196" fill="#39ff14" opacity="0">│   ├── triggers.py
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.6s" fill="freeze"/>
        </text>
        <text x="70" y="218" fill="#39ff14" opacity="0">│   ├── init_db.py
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.9s" fill="freeze"/>
        </text>
        <text x="70" y="240" fill="#39ff14" opacity="0">│   ├── requirements.txt
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.2s" fill="freeze"/>
        </text>
        <text x="70" y="262" fill="#39ff14" opacity="0">│   ├── Dockerfile
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.5s" fill="freeze"/>
        </text>
        <text x="70" y="284" fill="#39ff14" opacity="0">│   └── app/
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.8s" fill="freeze"/>
        </text>

        <!-- Level 1 - Frontend - Cyan -->
        <text x="70" y="314" fill="#00ffff" opacity="0">├── frontend/
            <animate attributeName="opacity" values="0;1" dur="0.4s" begin="3.1s" fill="freeze"/>
        </text>

        <!-- Level 2 - Frontend/app - Lime Green -->
        <text x="70" y="344" fill="#39ff14" opacity="0">│   ├── app/
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.5s" fill="freeze"/>
        </text>

        <!-- Level 3 - app children - Orange -->
        <text x="70" y="368" fill="#ffae00" opacity="0">│   │   ├── page.tsx
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.9s" fill="freeze"/>
        </text>
        <text x="70" y="390" fill="#ffae00" opacity="0">│   │   ├── layout.tsx
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.3s" fill="freeze"/>
