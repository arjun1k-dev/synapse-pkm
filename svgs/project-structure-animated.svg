    <!-- Legend -->
    <g font-family="'Courier New', monospace" font-size="11" class="neon-text">
        <text x="500" y="700" text-anchor="middle" fill="#666" opacity="0">Hierarchy Colors:
            <animate attributeName="opacity" values="0;1" dur="0.5s" begin="16s" fill="freeze"/>
        </text>

        <text x="320" y="722" fill="#ff00ff" opacity="0">● Level 0 (Root)
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="16.5s" fill="freeze"/>
        </text>
        <text x="430" y="722" fill="#00ffff" opacity="0">● Level 1
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="16.8s" fill="freeze"/>
        </text>
        <text x="510" y="722" fill="#39ff14" opacity="0">● Level 2
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="17.1s" fill="freeze"/>
        </text>
        <text x="590" y="722" fill="#ffae00" opacity="0">● Level 3
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="17.4s" fill="freeze"/>
        </text>
        <text x="670" y="722" fill="#ff69b4" opacity="0">● Level 4
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="17.7s" fill="freeze"/>
        </text>
        <text x="750" y="722" fill="#87ceeb" opacity="0">● Level 5
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="18s" fill="freeze"/>
        </text>
        <text x="830" y="722" fill="#98fb98" opacity="0">● Level 6
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="18.3s" fill="freeze"/>
        </text>
    </g>
</svg>