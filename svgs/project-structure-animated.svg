            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="14.3s" fill="freeze"/>
        </text>
        <text x="70" y="962" fill="#00ffff" opacity="0">├── .env.example
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="14.7s" fill="freeze"/>
        </text>
        <text x="70" y="984" fill="#00ffff" opacity="0">├── .gitignore
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="15.1s" fill="freeze"/>
        </text>
        <text x="70" y="1006" fill="#00ffff" opacity="0">└── README.md
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="15.5s" fill="freeze"/>
        </text>
