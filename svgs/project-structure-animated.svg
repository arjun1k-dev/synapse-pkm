        <!-- Level 2 - frontend config files - Lime Green -->
        <text x="70" y="852" fill="#39ff14" opacity="0">│   ├── package.json
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="12.7s" fill="freeze"/>
        </text>
        <text x="70" y="874" fill="#39ff14" opacity="0">│   ├── tailwind.config.ts
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="13.1s" fill="freeze"/>
        </text>
        <text x="70" y="896" fill="#39ff14" opacity="0">│   ├── next.config.js
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="13.5s" fill="freeze"/>
        </text>
        <text x="70" y="918" fill="#39ff14" opacity="0">│   └── Dockerfile
            <animate attributeName="opacity" values="0;1" dur="0.3s" begin="13.9s" fill="freeze"/>
