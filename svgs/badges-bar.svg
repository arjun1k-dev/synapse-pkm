<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="100%" height="100%">
    <rect width="800" height="60" fill="#0a0a14"/>
    <g font-family="'Courier New', monospace" font-size="14" fill="#000" text-anchor="middle">
        <rect x="10" y="15" width="140" height="30" rx="15" fill="#ff90e8" stroke="#000" stroke-width="2"/>
        <text x="80" y="34">Next.js 14</text>

        <rect x="160" y="15" width="130" height="30" rx="15" fill="#4dffff" stroke="#000" stroke-width="2"/>
        <text x="225" y="34">Python 3.12</text>

        <rect x="300" y="15" width="120" height="30" rx="15" fill="#ffdf00" stroke="#000" stroke-width="2"/>
        <text x="360" y="34">FastAPI</text>

        <rect x="430" y="15" width="140" height="30" rx="15" fill="#ff90e8" stroke="#000" stroke-width="2"/>
        <text x="500" y="34">PostgreSQL</text>

        <rect x="580" y="15" width="100" height="30" rx="15" fill="#4dffff" stroke="#000" stroke-width="2"/>
        <text x="630" y="34">Docker</text>

        <rect x="690" y="15" width="90" height="30" rx="15" fill="#ffdf00" stroke="#000" stroke-width="2"/>
        <text x="735" y="34">MIT</text>
    </g>
    <!-- Drift animation for the whole group -->
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-5; 0,0" dur="3s" repeatCount="indefinite"/>
</svg>