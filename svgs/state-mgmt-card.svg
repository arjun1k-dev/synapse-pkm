<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" width="100%" height="100%">
    <defs>
        <filter id="shadow"><feDropShadow dx="6" dy="6" stdDeviation="0" flood-color="#000"/></filter>
    </defs>
    <rect width="380" height="200" fill="#0a0a14"/>
    <g transform="translate(10,10)">
        <rect x="6" y="6" width="360" height="180" fill="#000" filter="url(#shadow)"/>
        <rect x="0" y="0" width="360" height="180" fill="#1a1a2e" stroke="#ff90e8" stroke-width="3"/>
        <text x="20" y="35" font-family="'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="900" fill="#ff90e8">State Management</text>
        <text x="20" y="60" font-family="'Courier New', monospace" font-size="13" fill="#ccc">No Redux/Zustand needed</text>
        <text x="20" y="85" font-family="'Courier New', monospace" font-size="11" fill="#999">• useState for local UI</text>
        <text x="20" y="105" font-family="'Courier New', monospace" font-size="11" fill="#999">• useEffect for side effects</text>
        <text x="20" y="125" font-family="'Courier New', monospace" font-size="11" fill="#999">• Server Components fetch data</text>
        <text x="20" y="145" font-family="'Courier New', monospace" font-size="11" fill="#999">• URL state for search queries</text>
        <animateTransform attributeName="transform" type="translate" values="0,0; -3,-3; 0,0" dur="1.9s" repeatCount="indefinite"/>
    </g>
</svg>