version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: synapse-db
    environment:
      POSTGRES_USER: synapse_user
      POSTGRES_PASSWORD: synapse_pass
      POSTGRES_DB: synapse_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse_user -d synapse_db"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: synapse-backend
    command: sh -c "python init_db.py && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://synapse_user:synapse_pass@db:5432/synapse_db
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: synapse-frontend
    command: pnpm start
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: